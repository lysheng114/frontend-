<!DOCTYPE html>
<head>
    <meta name="viewport" content="width=device-width">
    <title>Student Peer Support Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">📚 Student Peer Support Platform</div>
        <div class="user-actions">
            <button class="btn-login">Login</button>
        </div>
    </header>

    <main class="container">
        <div class="login-card">
            <h2>Welcome Back</h2>
            <p class="subtitle">Login Your Student Account&#128511;</p>
            
            <form class="login-form" action="home.html">
                <div class="form-group">
                    <label for="email">Student ID / email</label>
                    <input type="text" id="email" placeholder="Enter your student ID or email">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password">
                </div>

                <div class="form-options">
                    <label><input type="checkbox"> Remember me</label>
                    <a href="#" class="forgot-pwd">Forgot Password？🤭</a>
                </div>

                <button type="submit" class="btn-submit">Login Now</button>
            </form>
        </div>
    </main>

</body>
</html>
